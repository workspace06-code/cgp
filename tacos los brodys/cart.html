<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart | Tacos Los Brody's</title>
  <link rel="stylesheet" href="files/style.css" />
</head>

<body>
  <main class="cart-page">

    <header class="cart-header">
      <a href="order.html" class="back-btn">‹</a>

      <div>
        <h1>Your Cart</h1>
        <p>Review your order</p>
      </div>

      <a href="index.html" class="home-btn">🏠</a>
    </header>

    <section class="cart-list" id="cartList">
      <!-- Cart items will show here -->
    </section>

    <section class="cart-summary">
      <div class="summary-row">
        <span>Subtotal</span>
        <strong id="subtotal">$0.00</strong>
      </div>

      <a href="checkout.html" class="checkout-btn">
        Continue to Checkout
      </a>
    </section>

  </main>

  <script src="files/script.js"></script>
</body>
</html>
